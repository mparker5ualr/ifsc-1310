<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Rapid Prototype</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body>

  <div class="container py-5">

    <h1 class="text-center mb-5">
      Bootstrap Rapid Prototype
    </h1>

    <div class="row">

      <div class="col-md-4">
        <div class="card mb-4">

          <img
            src="https://picsum.photos/300/200"
            class="card-img-top"
            alt="Placeholder Image">

          <div class="card-body">

            <h5 class="card-title">
              Celestial Jewelry
            </h5>

            <p class="card-text">
              Example responsive Bootstrap card layout.
            </p>

            <a href="#" class="btn btn-primary">
              Learn More
            </a>

          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card mb-4">

          <img
            src="https://picsum.photos/301/200"
            class="card-img-top"
            alt="Placeholder Image">

          <div class="card-body">

            <h5 class="card-title">
              Responsive Design
            </h5>

            <p class="card-text">
              Bootstrap grid system demonstration.
            </p>

            <a href="#" class="btn btn-primary">
              Learn More
            </a>

          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card mb-4">

          <img
            src="https://picsum.photos/302/200"
            class="card-img-top"
            alt="Placeholder Image">

          <div class="card-body">

            <h5 class="card-title">
              Mobile Friendly
            </h5>

            <p class="card-text">
              Layout automatically adjusts for screen sizes.
            </p>

            <a href="#" class="btn btn-primary">
              Learn More
            </a>

          </div>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
