<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Images Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
    }

    img {
      width: 100%;
      max-width: 600px;
      height: auto;
    }
  </style>
</head>

<body>

  <h1>Responsive Images Demo</h1>
  <p>This page demonstrates responsive images using the &lt;picture&gt; element.</p>

  <picture>
    <!-- Large screens -->
    <source 
      srcset="assets/images/bracelet-large.png" 
      media="(min-width: 1024px)">

    <!-- Medium screens -->
    <source 
      srcset="assets/images/bracelet-medium.png" 
      media="(min-width: 600px)">

    <!-- Default (mobile) -->
    <img 
      src="assets/images/bracelet-small.png" 
      alt="Celestial bracelet">
  </picture>

</body>
</html>
